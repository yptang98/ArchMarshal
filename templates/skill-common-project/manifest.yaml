id: skill.common-project.example
name: example-common-project-skill
kind: common_project_skill
version: 0.1.0
status: experimental
priority: normal
scope: common_project
summary: Template for a reproducible cross-project engineering workflow.
tags:
  - project-governance
  - reproducibility
triggers:
  - example project workflow
negative_triggers:
  - one-off debugging without workflow impact
reproducibility:
  required: true
  scripts_local: true
  templates_local: true
  references_local: true
paths:
  skill_root: .
  scripts: scripts
  templates: templates
  references: references
  tests: tests
dependencies:
  commands:
    - git
  files: []
  network_required: false
outputs:
  default_dir: .agent/reports
  artifact_kind: report
  ttl_days: 30
permissions:
  reads:
    - project.index
  writes:
    - report.example
  proposes:
    - project.registry
  forbidden:
    - global.skills
