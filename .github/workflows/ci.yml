name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Test with branch coverage
        run: python -m pytest --cov=archmarshal --cov-branch --cov-report=term-missing --cov-report=json:coverage.json
      - name: Enforce statement and branch gates
        run: python scripts/check_coverage.py coverage.json --statements 85 --branches 75
      - name: CLI smoke test
        run: archmarshal lint examples/simple-project --pretty

  package:
    name: Build and clean-install artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install build tools
        run: python -m pip install build twine ruff
      - name: Static checks
        run: ruff check src tests
      - name: Build wheel and sdist
        run: python -m build
      - name: Validate package metadata
        run: python -m twine check dist/*
      - name: Install and inspect wheel
        shell: bash
        run: |
          python -m venv /tmp/archmarshal-wheel
          /tmp/archmarshal-wheel/bin/python -m pip install dist/*.whl
          /tmp/archmarshal-wheel/bin/archmarshal --help >/dev/null
          /tmp/archmarshal-wheel/bin/archmarshal-start --help >/dev/null
          /tmp/archmarshal-wheel/bin/archmarshal-end --help >/dev/null
          /tmp/archmarshal-wheel/bin/python - <<'PY'
          from importlib import resources
          from archmarshal.schema_validation import SCHEMA_FILES

          root = resources.files("archmarshal.schemas")
          missing = [name for name in SCHEMA_FILES.values() if not root.joinpath(name).is_file()]
          if missing:
              raise SystemExit(f"missing packaged schemas: {missing}")
          PY
      - name: Clean-install sdist
        shell: bash
        run: |
          python -m venv /tmp/archmarshal-sdist
          /tmp/archmarshal-sdist/bin/python -m pip install dist/*.tar.gz
          /tmp/archmarshal-sdist/bin/archmarshal --help >/dev/null
      - name: Ensure build did not dirty tracked files
        run: git diff --exit-code
