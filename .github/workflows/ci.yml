name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Test with branch coverage
        run: python -m pytest --cov=archmarshal --cov-branch --cov-report=term-missing --cov-report=json:coverage.json
      - name: Enforce statement and branch gates
        run: python scripts/check_coverage.py coverage.json --statements 85 --branches 75
      - name: CLI smoke test
        run: archmarshal lint examples/simple-project --pretty

  package:
    name: Artifacts / ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install build tools
        run: python -m pip install build twine ruff
      - name: Static checks
        run: ruff check src tests scripts
      - name: Verify version contract
        run: python scripts/check_version_contract.py
      - name: Build wheel and sdist
        run: python -m build
      - name: Validate package metadata
        run: python -m twine check dist/*
      - name: Install and inspect wheel
        run: python scripts/package_smoke.py "dist/*.whl" --check-schemas
      - name: Clean-install sdist
        run: python scripts/package_smoke.py "dist/*.tar.gz"
      - name: Ensure build did not dirty tracked files
        run: git diff --exit-code
