name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Test with branch coverage
        run: python -m pytest --cov=archmarshal --cov-branch --cov-report=term-missing --cov-report=json:coverage.json
      - name: Enforce statement and branch gates
        run: >-
          python scripts/check_coverage.py coverage.json
          --statements 85 --branches 75
          --module src/archmarshal/adoption.py=88,80
          --module src/archmarshal/safety.py=80,64
          --module src/archmarshal/adoption_tx.py=80,65
          --module src/archmarshal/io.py=95,88
          --module src/archmarshal/workspace_lock.py=82,60
          --module src/archmarshal/skill_index.py=85,75
          --module src/archmarshal/skill_review.py=85,61
          --module src/archmarshal/session.py=85,75
          --module src/archmarshal/user_store.py=84,70
          --module src/archmarshal/candidate_draft.py=80,60
          --module src/archmarshal/doctor.py=95,90
          --module src/archmarshal/_doctor_core.py=75,65
          --module src/archmarshal/_doctor_workspace.py=80,68
          --module src/archmarshal/_doctor_immutable.py=78,64
          --module src/archmarshal/_doctor_sessions.py=80,65
          --module src/archmarshal/formats.py=95,88
      - name: CLI smoke test
        run: archmarshal lint examples/simple-project --pretty

  package:
    name: Artifacts / ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install build tools
        run: python -m pip install build twine ruff
      - name: Static checks
        run: ruff check src tests scripts plugins
      - name: Verify version contract
        run: python scripts/check_version_contract.py
      - name: Verify Codex plugin engine lock
        run: python scripts/build_plugin_engine_lock.py --check
      - name: Build wheel and sdist
        run: python -m build
      - name: Validate package metadata
        run: python -m twine check dist/*
      - name: Install and inspect wheel
        run: python scripts/package_smoke.py "dist/*.whl" --check-schemas
      - name: Clean-install sdist
        run: python scripts/package_smoke.py "dist/*.tar.gz"
      - name: Ensure build did not dirty tracked files
        run: git diff --exit-code
