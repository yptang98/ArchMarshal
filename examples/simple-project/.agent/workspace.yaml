workspace:
  name: simple-project
  version: 0.1.0
  description: Minimal ArchMarshal example project.

paths:
  project_root: .
  code_roots:
    - src
  agent_root: .agent
  project_skills:
    - .agents/skills
  generated_skills:
    - .agents/skills/generated
  knowledge:
    - .agent/knowledge
  context_modules:
    - .agent/context-modules
  reports:
    - .agent/reports
  plans:
    - .agent/plans
  history:
    - .agent/history
  archive:
    - .agent/archive
  cache:
    - .agent/cache
  inbox:
    - .agent/inbox
