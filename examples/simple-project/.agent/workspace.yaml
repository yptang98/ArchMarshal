workspace:
  name: simple-project
  version: 0.1.0
  description: Minimal ArchMarshal example project.

save_paths:
  skills:
    generated: .agents/skills/generated
    project: .agents/skills/project
  project_files:
    checkpoints: .agent/inbox/checkpoints
    reports: .agent/reports
    plans: .agent/plans
    history: .agent/history
    knowledge: .agent/knowledge
    artifacts: .agent/inbox

naming:
  project_files:
    strategy: time_topic_kind
    timezone: UTC
    timestamp_format: "%Y%m%d-%H%M%S"
    max_slug_words: 6

paths:
  project_root: .
  code_roots:
    - src
  agent_root: .agent
  global_skills:
    - .agents/global
  functional_skills:
    - .agents/skills/functional
  common_project_skills:
    - .agents/skills/common-project
  project_skills:
    - .agents/skills
  generated_skills:
    - .agents/skills/generated
  knowledge:
    - .agent/knowledge
  context_modules:
    - .agent/context-modules
  reports:
    - .agent/reports
  plans:
    - .agent/plans
  history:
    - .agent/history
  archive:
    - .agent/archive
  cache:
    - .agent/cache
  inbox:
    - .agent/inbox
