$schema: https://json-schema.org/draft/2020-12/schema
$id: https://archmarshal.local/schemas/memory-records.schema.yaml
title: ArchMarshal Memory Records
type: object
required:
  - memory_records
additionalProperties: false
properties:
  memory_records:
    type: array
    items:
      type: object
      required:
        - id
        - store_id
        - kind
        - scope
        - namespace
        - status
        - content_path
        - confidence
        - review_status
        - retrieval_keys
        - read_policy
      additionalProperties: true
      properties:
        id:
          type: string
          pattern: "^mem\\.[a-z0-9_.-]+$"
        store_id:
          type: string
          pattern: "^memory\\.[a-z0-9_.-]+$"
        kind:
          enum:
            - semantic
            - procedural
            - preference
            - decision
            - pitfall
            - evidence
            - code_structure
        scope:
          enum:
            - user
            - org
            - workspace
            - project
            - task
            - agent
        namespace:
          type: array
          items:
            type: string
        status:
          enum:
            - candidate
            - active
            - promoted
            - stale
            - superseded
            - archived
        content_path:
          type: string
        evidence_refs:
          type: array
          items:
            type: string
        confidence:
          enum:
            - generated
            - observed
            - reviewed
        review_status:
          enum:
            - pending_human
            - reviewed
            - rejected
        supersedes:
          type: array
          items:
            type: string
        last_verified:
          type: string
        retrieval_keys:
          type: array
          minItems: 1
          items:
            type: string
        read_policy:
          type: string
        ttl_days:
          type: integer
          minimum: 0
