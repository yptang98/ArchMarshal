$schema: https://json-schema.org/draft/2020-12/schema
$id: https://archmarshal.local/schemas/workspace.schema.yaml
title: ArchMarshal Workspace
type: object
required:
  - workspace
  - paths
additionalProperties: false
properties:
  workspace:
    type: object
    required:
      - name
      - version
    additionalProperties: false
    properties:
      name:
        type: string
        minLength: 1
      version:
        type: string
        pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"
      description:
        type: string
      created_on:
        type: string
      adopted_on:
        type: string
      tags:
        type: array
        uniqueItems: true
        items:
          type: string
      management_mode:
        enum:
          - overlay
          - native
  save_paths:
    type: object
    additionalProperties: false
    properties:
      skills:
        type: object
        additionalProperties:
          type: string
        properties:
          generated:
            type: string
          project:
            type: string
      project_files:
        type: object
        additionalProperties:
          type: string
        properties:
          checkpoints:
            type: string
          reports:
            type: string
          plans:
            type: string
          history:
            type: string
          knowledge:
            type: string
          artifacts:
            type: string
  naming:
    type: object
    additionalProperties: false
    properties:
      project_files:
        type: object
        additionalProperties: false
        properties:
          strategy:
            enum:
              - time_topic_kind
          timezone:
            enum:
              - UTC
          timestamp_format:
            type: string
          max_slug_words:
            type: integer
            minimum: 1
            maximum: 12
  paths:
    type: object
    required:
      - project_root
      - agent_root
    additionalProperties: false
    properties:
      project_root:
        type: string
      code_roots:
        type: array
        items:
          type: string
      agent_root:
        type: string
      source_skill_roots:
        type: array
        uniqueItems: true
        items:
          type: string
      global_skills:
        type: array
        items:
          type: string
      functional_skills:
        type: array
        items:
          type: string
      common_project_skills:
        type: array
        items:
          type: string
      project_skills:
        type: array
        items:
          type: string
      generated_skills:
        type: array
        items:
          type: string
      knowledge:
        type: array
        items:
          type: string
      context_modules:
        type: array
        items:
          type: string
      reports:
        type: array
        items:
          type: string
      plans:
        type: array
        items:
          type: string
      history:
        type: array
        items:
          type: string
      archive:
        type: array
        items:
          type: string
      cache:
        type: array
        items:
          type: string
      inbox:
        type: array
        items:
          type: string
